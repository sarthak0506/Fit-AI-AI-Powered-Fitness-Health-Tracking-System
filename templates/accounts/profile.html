{% extends 'base.html' %}
{% block title %}Profile — FitAI{% endblock %}
{% block nav_profile %}active{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Your Profile</h1>
  <p>Update your details to get a personalised plan</p>
</div>
{% for msg in messages %}
<div class="alert alert-success">{{ msg }}</div>
{% endfor %}
<div class="card" style="max-width:640px;">
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div class="form-group">
        <label>Age</label>
        <input name="age" type="number" class="form-control" value="{{ profile.age }}"/>
      </div>
      <div class="form-group">
        <label>Gender</label>
        <select name="gender" class="form-control">
          <option value="male"   {% if profile.gender == 'male'   %}selected{% endif %}>Male</option>
          <option value="female" {% if profile.gender == 'female' %}selected{% endif %}>Female</option>
        </select>
      </div>
      <div class="form-group">
        <label>Weight (kg)</label>
        <input name="weight_kg" type="number" step="0.1" class="form-control" value="{{ profile.weight_kg }}"/>
      </div>
      <div class="form-group">
        <label>Height (cm)</label>
        <input name="height_cm" type="number" step="0.1" class="form-control" value="{{ profile.height_cm }}"/>
      </div>
      <div class="form-group">
        <label>Activity level (days/week)</label>
        <select name="activity_days" class="form-control">
          {% for i in "123456" %}
          <option value="{{ i }}" {% if profile.activity_days == i|add:0 %}selected{% endif %}>{{ i }} day{{ i|add:0|pluralize }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Goal</label>
        <select name="goal" class="form-control">
          <option value="bulk"     {% if profile.goal == 'bulk'     %}selected{% endif %}>Bulk (gain muscle)</option>
          <option value="cut"      {% if profile.goal == 'cut'      %}selected{% endif %}>Cut (lose fat)</option>
          <option value="maintain" {% if profile.goal == 'maintain' %}selected{% endif %}>Maintain</option>
        </select>
      </div>
      <div class="form-group">
        <label>Diet preference</label>
        <select name="diet_pref" class="form-control">
          <option value="veg"     {% if profile.diet_pref == 'veg'     %}selected{% endif %}>Vegetarian</option>
          <option value="non-veg" {% if profile.diet_pref == 'non-veg' %}selected{% endif %}>Non-Veg</option>
          <option value="vegan"   {% if profile.diet_pref == 'vegan'   %}selected{% endif %}>Vegan</option>
        </select>
      </div>
      <div class="form-group">
        <label>Workout location</label>
        <select name="location" class="form-control">
          <option value="gym"  {% if profile.location == 'gym'  %}selected{% endif %}>Gym</option>
          <option value="home" {% if profile.location == 'home' %}selected{% endif %}>Home</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;">
        <input name="supplements" type="checkbox" {% if profile.supplements %}checked{% endif %} style="width:16px;height:16px;accent-color:var(--accent)"/>
        I use protein supplements
      </label>
    </div>
    <div class="form-group">
      <label>Profile photo</label>
      <input name="avatar" type="file" accept="image/*" class="form-control"/>
    </div>
    <div style="display:flex;gap:12px;margin-top:8px;">
      <button class="btn btn-primary" type="submit">
        <i class="fa-solid fa-floppy-disk"></i> Save profile
      </button>
      <a href="{% url 'dashboard' %}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
