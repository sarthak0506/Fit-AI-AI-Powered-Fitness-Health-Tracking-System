{% extends 'base.html' %}
{% block title %}Login — FitAI{% endblock %}
{% block extra_css %}
<style>
body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
.auth-wrap { width:100%; max-width:420px; padding:20px; }
.auth-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:20px; padding:40px;
}
.auth-logo {
  display:flex; align-items:center; gap:12px;
  justify-content:center; margin-bottom:32px;
}
.auth-logo .logo-icon {
  width:48px; height:48px; border-radius:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex; align-items:center; justify-content:center;
  font-size:22px; font-weight:800; color:#fff;
}
.auth-logo span { font-size:24px; font-weight:800; }
.auth-title { text-align:center; margin-bottom:28px; }
.auth-title h2 { font-size:20px; font-weight:700; margin-bottom:4px; }
.auth-title p  { font-size:13px; color:var(--muted); }
.divider { display:flex; align-items:center; gap:12px; margin:20px 0; }
.divider span { font-size:12px; color:var(--muted); white-space:nowrap; }
.divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }
.auth-footer { text-align:center; margin-top:20px; font-size:13px; color:var(--muted); }
.auth-footer a { color:var(--accent2); font-weight:500; }
.btn-full { width:100%; justify-content:center; padding:13px; font-size:15px; }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">F</div>
      <span>FitAI</span>
    </div>
    <div class="auth-title">
      <h2>Welcome back</h2>
      <p>Sign in to your fitness dashboard</p>
    </div>
    {% for msg in messages %}
    <div class="alert alert-error">{{ msg }}</div>
    {% endfor %}
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input name="username" class="form-control" placeholder="your username" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input name="password" type="password" class="form-control" placeholder="••••••••" required/>
      </div>
      <button class="btn btn-primary btn-full" type="submit">
        <i class="fa-solid fa-right-to-bracket"></i> Sign in
      </button>
    </form>
    <div class="auth-footer">
      No account? <a href="{% url 'signup' %}">Create one free</a>
    </div>
  </div>
</div>
{% endblock %}
